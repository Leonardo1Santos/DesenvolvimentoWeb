<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 01</title>
</head>
<body>
    <div>
  <h2>Listas não ordnadas</h2>
  <ul type="circle">
    <li>café</li>
    <li>chá</li>
    <li>Coca cola</li>
</ul>
</div>
    <ul type="cicle">
        <li>café</li>
        <li>chá</li>
        <li>Coca cola</li>
      </ul>
    </div>

    <div>
        <h2>Listas ordnadas</h2>
        <ol type="number">
            <li>café</li>
            <li>chá</li>
            <li>Coca cola</li>
          </ol>
        </div>
        <ol type="I">
            <li>café</li>
            <li>chá</li>
            <li>Coca cola</li>
          </ol>
    </div>
   
</body>
</body>
</html>
