<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escola virual</title>
</head>
<body>
    <div>
        <h1>Escola virtula </h1>
        <h2>form de pré-maticula</h2>

        <form>
            <fieldset>
                <legend>dados pessoais</legend>
                <p><label>nome do aluno:
                    <input type="text" name="nomeAluno" placeholder="nomeAluno">
                </label></p>

                <p><label>data de nascimento:
                    <input type="date" name="nascimento">
                </label></p>

                <p><label>nome da mãe:
                    <input type="text" name="nomeAluno" placeholder="nome da mãe">
                </label></p>

                <p><label>nome do pai:
                    <input type="text" name="nomeAluno" placeholder="nome do pai">
                </label></p>

                <p><label>tell:
                    <input type="text" name="nomeAluno" placeholder="tell">
                </label></p>

                <p><label>e-mail:
                    <input type="text" name="nomeAluno" placeholder="e-mail">
                </label></p>


            </fieldset>

            <fieldset>

                <legend>infomações pessoais</legend>

                <label>
                    <select name="serie">
                        <option> pre </option>
                        <option> fundamenal </option>
                        <option> médio </option>
                    </select>
                </label><br>

                    <label>Turno:</label>
        <label class="inline"><br>
            <input type="radio" name="turno" value="manha"> Manhã
        </label><br>
        <label class="inline">
            <input type="radio" name="turno" value="tarde"> Tarde
        </label><br>

        <div>
            <label>Atividades Extracurriculares:</label><br>
            <label><input type="checkbox" name="atividades" value="informatica"> Informática</label><br>
            <label><input type="checkbox" name="atividades" value="musica"> Música</label><br>
            <label><input type="checkbox" name="atividades" value="balet"> Balet</label><br>
            <label><input type="checkbox" name="atividades" value="pintura"> Pintura</label><br>
            <label><input type="checkbox" name="atividades" value="judo"> Judô</label><br>
            <label><input type="checkbox" name="atividades" value="futebol"> Futebol</label>
          </div>
        </fieldset>
    
        <div class="buttons">
          <button type="submit">Enviar Formulário</button>
          <button type="reset">Limpar Campos</button>
        </div>
      </form>
    </div>
    




            </fieldset>
        </form>
    </div>
</body>
</html>
